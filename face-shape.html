<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Palette | Face Shape Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Stoke:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
  <script src="/layout.js"></script>
  <link rel="icon" href="/assets/images/icon.png">
  <style>
    /* ── Face Shape Selection Page ── */
    .body-shape-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      width: 100%;
      max-width: 680px;
    }

    .shape-card {
      background: #fff8f8;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      width: calc(50% - 8px);
      min-width: 200px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      text-align: center;
      position: relative;
    }
    .shape-card:hover {
      border-color: var(--rose);
      box-shadow: 0 4px 20px var(--shadow);
      transform: translateY(-2px);
    }
    .shape-card.selected {
      border-color: var(--rose);
      background: #fff0f0;
      box-shadow: 0 0 0 3px var(--blush);
    }

    .shape-emoji {
      font-size: 2.4rem;
      margin-bottom: 10px;
      display: block;
    }
    .shape-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--deep);
      margin-bottom: 6px;
    }
    .shape-tagline {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 1.5;
    }

    .shape-checkmark {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 1rem;
      color: var(--rose);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .shape-card.selected .shape-checkmark {
      opacity: 1;
    }

    .shape-details {
      display: none;
      margin-top: 12px;
      text-align: left;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .shape-card.expanded .shape-details {
      display: block;
    }
    .shape-detail-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .shape-detail-icon {
      flex-shrink: 0;
      font-size: 0.85rem;
    }

    .expand-hint {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rose);
      margin-top: 10px;
      display: block;
    }

    /* ── Result Page Styles ── */
    .analysis-hero {
      width: 100%;
      max-width: 680px;
      border-radius: 20px;
      padding: 48px 40px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .analysis-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      filter: blur(0);
      z-index: 0;
    }
    .analysis-hero * { position: relative; z-index: 1; }

    .season-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }
    .season-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.8rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .season-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      font-style: normal;
      letter-spacing: 0.14em;
      opacity: 0.6;
      margin-bottom: 24px;
    }

    .analysis-section {
      width: 100%;
      max-width: 680px;
      background: #fff8f8;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      margin-bottom: 20px;
      color: var(--deep);
    }

    .traits-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .trait-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.8rem;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }
    .trait-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      margin-top: 1px;
    }

    .clothing-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .clothing-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
    }
    .clothing-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--deep);
      margin-bottom: 4px;
    }
    .clothing-item-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="main-area">
<div id="app">
  <main id="main-content">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      Loading face shape analysis…
    </div>
  </main>
</div>
</div>

<script src="face-data.js"></script>
<script>
const SHAPES = [
  { key: 'oval',      label: 'Oval',      emoji: '🥚', tagline: 'face length greater than width, balanced proportions', image:'/assets/images/oval-face.png' },
  { key: 'round',     label: 'Round',     emoji: '🔵', tagline: 'face nearly as wide as it is long, soft curves', image:'/assets/images/circle-face.png' },
  { key: 'square',    label: 'Square',    emoji: '🟦', tagline: 'strong jawline, forehead and jaw similar width', image:'/assets/images/square-face.png' },
  { key: 'heart',     label: 'Heart',     emoji: '🫀', tagline: 'wider forehead tapering to a narrow pointed chin', image:'/assets/images/heart-face.png' },
  { key: 'diamond',   label: 'Diamond',   emoji: '💎', tagline: 'wide cheekbones, narrow forehead and chin', image:'/assets/images/diamond-face.png' },
  { key: 'rectangle', label: 'Rectangle', emoji: '▬',  tagline: 'face length greatest, forehead and jaw similar width', image:'/assets/images/rectangle-face.png' },
  { key: 'triangle',  label: 'Triangle',  emoji: '🔺', tagline: 'wider jawline, narrowing toward the forehead', image:'/assets/images/triangle-face.png' },
];

let selectedShape = null;
const main = document.getElementById('main-content');

const savedShape = sessionStorage.getItem('hoohacks_face_shape');
if (savedShape) {
  setTimeout(() => renderResult(savedShape), 300);
} else {
  buildSelectionPage();
}

/* ═══════════════════════════════════════════════════
   SELECTION PAGE
═══════════════════════════════════════════════════ */
function buildSelectionPage() {
  main.innerHTML = `
    <p class="page-title">Face Shape Analysis</p>

    <div class="instruction-banner" id="instruction-banner">
      <div class="step-label">Select your face shape</div>
      <div class="feature-name" style="font-size:1rem; letter-spacing:0.1em; color:var(--muted); font-family:'DM Mono',monospace;">
        Not sure? Click each card to read its characteristics
      </div>
    </div>

    <div class="body-shape-grid" id="shape-grid"></div>

    <p style="font-size:0.72rem; color:var(--muted); letter-spacing:0.08em; text-align:center; max-width:480px;">
      💡 Face shape is based on the relationship between your forehead, cheekbones, and jawline — not your weight or features.
    </p>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="window.location.href='index.html'">← Go back</button>
      <button class="btn btn-rose" id="analyze-btn" style="display:none;" onclick="goToResult()">
        Analyze my face shape →
      </button>
    </div>
  `;

  buildShapeCards();
}

function buildShapeCards() {
  const grid = document.getElementById('shape-grid');
  grid.innerHTML = '';

  SHAPES.forEach(shape => {
    const data = FACE_DATA[shape.key];
    const card = document.createElement('div');
    card.className = 'shape-card';
    card.id = 'card-' + shape.key;

    card.innerHTML = `
      <span class="shape-checkmark">✓</span>
      <span class="shape-emoji"><img src="${shape.image}" style="width:45%; height:45%;"/></span>
      <div class="shape-name">${shape.label}</div>
      <div class="shape-tagline">${shape.tagline}</div>
      <span class="expand-hint">▾ tap to read characteristics</span>
      <div class="shape-details">
        ${data.characteristics.map(c => `
          <div class="shape-detail-item">
            <span class="shape-detail-icon">${c.icon}</span>
            <span>${c.text}</span>
          </div>
        `).join('')}
      </div>
    `;

    card.addEventListener('click', () => handleCardClick(shape.key, card));
    grid.appendChild(card);
  });
}

function handleCardClick(key, card) {
  const isExpanded = card.classList.contains('expanded');
  const isSelected = card.classList.contains('selected');

  if (isSelected && isExpanded) {
    card.classList.remove('selected', 'expanded');
    card.querySelector('.expand-hint').textContent = '▾ tap to read characteristics';
    selectedShape = null;
    document.getElementById('analyze-btn').style.display = 'none';
    return;
  }

  document.querySelectorAll('.shape-card').forEach(c => {
    c.classList.remove('selected', 'expanded');
    c.querySelector('.expand-hint').textContent = '▾ tap to read characteristics';
  });

  card.classList.add('selected', 'expanded');
  card.querySelector('.expand-hint').textContent = '▴ collapse';
  selectedShape = key;
  document.getElementById('analyze-btn').style.display = 'inline-flex';
}

function goToResult() {
  if (!selectedShape) return;
  sessionStorage.setItem('hoohacks_face_shape', selectedShape);
  main.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>Analysing your face shape…</div>`;
  setTimeout(() => renderResult(selectedShape), 500);
}

/* ═══════════════════════════════════════════════════
   RESULT PAGE
═══════════════════════════════════════════════════ */
function renderResult(shapeKey) {
  const data = FACE_DATA[shapeKey];
  if (!data) { buildSelectionPage(); return; }

  main.innerHTML = '';

  // ── Hero card
  const hero = document.createElement('div');
  hero.className = 'analysis-hero';
  hero.style.background = data.heroGradient;
  hero.style.color = data.textColor;
  hero.style.border = '1px solid rgba(0,0,0,0.06)';
  hero.style.boxShadow = '0 12px 48px rgba(0,0,0,0.10)';
  hero.innerHTML = `
    <div class="season-badge" style="background:${data.badgeBg}; color:${data.badgeColor};">
      ${data.emoji} Your face shape
    </div>
    <div class="season-name">${data.name}</div>
    <div class="season-sub">${data.oneWordSum}</div>
    <p style="font-size:0.82rem; line-height:1.8; letter-spacing:0.03em; max-width:480px; margin:0 auto; opacity:0.85;">
      ${data.stylingTip}
    </p>
  `;
  main.appendChild(hero);

  // ── Characteristics
  const charSection = makeSection('Your characteristics');
  charSection.innerHTML += `
    <div class="traits-list">
      ${data.characteristics.map(c => `
        <div class="trait-row">
          <div class="trait-icon" style="background:#fff8f8; border:1px solid var(--border);">${c.icon}</div>
          <span>${c.text}</span>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(charSection);

  // ── Best cuts
  const cutsSection = makeSection('✦ Best haircuts for you');
  cutsSection.innerHTML += `<div class="clothing-grid">${data.cuts.map(renderItem).join('')}</div>`;
  main.appendChild(cutsSection);

  // ── Best bangs
  const bangsSection = makeSection('✦ Best bangs for you');
  bangsSection.innerHTML += `<div class="clothing-grid">${data.bangs.map(renderItem).join('')}</div>`;
  main.appendChild(bangsSection);

  // ── Best lengths
  const lengthsSection = makeSection('✦ Hair lengths guide');
  lengthsSection.innerHTML += `<div class="clothing-grid">${data.lengths.map(renderItem).join('')}</div>`;
  main.appendChild(lengthsSection);

  // ── Styling tips
  const stylingSection = makeSection('✦ Styling techniques');
  stylingSection.innerHTML += `<div class="clothing-grid">${data.styling.map(renderItem).join('')}</div>`;
  main.appendChild(stylingSection);

  // ── Best combos
  const bestSection = makeSection('Best combinations');
  bestSection.innerHTML += `
    <div class="traits-list">
      ${data.bestCombos.map(c => `
        <div class="trait-row">
          <div class="trait-icon" style="background:#e8f5e9; border:1px solid #c8e6c9;">✓</div>
          <span>${c}</span>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(bestSection);

  // ── Avoid
  const avoidSection = makeSection('Styles to avoid');
  avoidSection.innerHTML += `
    <p style="font-size:0.78rem; color:var(--muted); margin-bottom:16px; line-height:1.7; letter-spacing:0.03em;">
      These styles work against your natural face shape and can throw off your proportions.
    </p>
    <div class="traits-list">
      ${data.avoid.map(a => `
        <div class="trait-row">
          <div class="trait-icon" style="background:#fce4ec; border:1px solid #f8bbd0;">✕</div>
          <span>${a}</span>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(avoidSection);

  // ── Action buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.innerHTML = `
    <button class="btn btn-ghost" onclick="resetShape()">← Pick again</button>
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">Return to Home</button>
    <button class="btn btn-rose" onclick="window.location.href='body-shape.html'">Body shape →</button>
  `;
  main.appendChild(btnRow);
}

function renderItem(item) {
  return `
    <div class="clothing-item">
      <div class="clothing-item-name">${item.name}</div>
      <div class="clothing-item-desc">${item.description}</div>
    </div>
  `;
}

function makeSection(title) {
  const s = document.createElement('div');
  s.className = 'analysis-section';
  s.innerHTML = `<div class="section-heading">${title}</div>`;
  return s;
}

function resetShape() {
  sessionStorage.removeItem('hoohacks_face_shape');
  selectedShape = null;
  buildSelectionPage();
}
</script>
</body>
</html>
