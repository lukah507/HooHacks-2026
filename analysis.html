<script>
/* ═══════════════════════════════════════════════════
   COLOR MATH UTILITIES
═══════════════════════════════════════════════════ */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){ h=s=0; }
  else {
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r: h=((g-b)/d+(g<b?6:0))/6; break;
      case g: h=((b-r)/d+2)/6; break;
      case b: h=((r-g)/d+4)/6; break;
    }
  }
  return {h:h*360, s:s*100, l:l*100};
}

function hexToHsl(hex) {
  const {r,g,b}=hexToRgb(hex);
  return rgbToHsl(r,g,b);
}

// Rotate hue by degrees
function rotateHue(hex, deg) {
  const {h,s,l}=hexToHsl(hex);
  return hslToHex((h+deg+360)%360, s, l);
}

function hslToHex(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return '#'+f(0)+f(8)+f(4);
}

// Perceived brightness (0-255)
function brightness(hex) {
  const {r,g,b}=hexToRgb(hex);
  return (r*299+g*587+b*114)/1000;
}

// Warm vs cool: positive = warm, negative = cool
function warmthScore(hex) {
  const {r,g,b}=hexToRgb(hex);
  return (r - b);  // warm colors have more red, cool have more blue
}

// Chroma / saturation-like
function chroma(hex) {
  const {r,g,b}=hexToRgb(hex);
  return Math.max(r,g,b)-Math.min(r,g,b);
}

/* ═══════════════════════════════════════════════════
   SEASONAL CLASSIFICATION
═══════════════════════════════════════════════════ */
function classifySeason(colors) {
  const { eyes, lips, face, hair } = colors;

  // Compute characteristics from skin (face) as primary, with other features as context
  const faceHsl   = hexToHsl(face);
  const hairHsl   = hexToHsl(hair);
  const eyesHsl   = hexToHsl(eyes);

  const skinWarmth   = warmthScore(face);
  const hairWarmth   = warmthScore(hair);
  const avgWarmth    = (skinWarmth * 2 + hairWarmth + warmthScore(eyes)) / 4;

  const skinBright   = brightness(face);
  const hairBright   = brightness(hair);
  const skinChroma   = chroma(face);
  const hairChroma   = chroma(hair);
  const eyesSat      = eyesHsl.s;

  // Contrast: difference between skin brightness and hair brightness
  const contrast = Math.abs(skinBright - hairBright);

  // Depth: overall darkness
  const avgBright = (skinBright + hairBright) / 2;

  // Muted vs vivid
  const avgChroma = (skinChroma + hairChroma) / 2;

  const isWarm   = avgWarmth > 15;
  const isCool   = avgWarmth < -10;
  const isDeep   = avgBright < 120;
  const isLight  = avgBright > 170;
  const isVivid  = avgChroma > 55;
  const isMuted  = avgChroma < 30;
  const isHighContrast = contrast > 60;

  // Season scoring
  const scores = {
    spring:  0,
    summer:  0,
    autumn:  0,
    winter:  0,
  };

  if (isWarm)  { scores.spring += 2; scores.autumn += 2; }
  if (isCool)  { scores.summer += 2; scores.winter += 2; }
  if (isLight) { scores.spring += 2; scores.summer += 2; }
  if (isDeep)  { scores.autumn += 1; scores.winter += 2; }
  if (isVivid) { scores.spring += 1; scores.winter += 2; }
  if (isMuted) { scores.summer += 2; scores.autumn += 2; }
  if (isHighContrast) { scores.winter += 2; }
  if (!isHighContrast && isLight) { scores.summer += 1; scores.spring += 1; }

  // Skin undertone hue nudge
  if (faceHsl.h > 20 && faceHsl.h < 50) { scores.spring += 1; scores.autumn += 1; } // golden
  if (faceHsl.h > 0  && faceHsl.h < 20) { scores.autumn += 1; }                     // copper/red
  if (faceHsl.h > 180) { scores.winter += 1; scores.summer += 1; }                  // pink/cool

  const season = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

  // Sub-season (second highest score shapes tone)
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const runner = sorted[1][0];

  const subMap = {
    spring: {
      spring: 'True Spring',
      summer: 'Light Spring',
      autumn: 'Warm Spring',
      winter: 'Bright Spring',
    },
    summer: {
      summer: 'True Summer',
      spring: 'Light Summer',
      winter: 'Cool Summer',
      autumn: 'Soft Summer',
    },
    autumn: {
      autumn: 'True Autumn',
      spring: 'Warm Autumn',
      winter: 'Deep Autumn',
      summer: 'Soft Autumn',
    },
    winter: {
      winter: 'True Winter',
      spring: 'Bright Winter',
      summer: 'Cool Winter',
      autumn: 'Deep Winter',
    },
  };

  const subSeason = subMap[season]?.[runner] || subMap[season]?.[season];
  console.log(subSeason);

  return { season, subSeason, scores, isWarm, isCool, isDeep, isLight, isVivid, isMuted, contrast };
}

/* ═══════════════════════════════════════════════════
   COLOR HARMONY GENERATION
═══════════════════════════════════════════════════ */
function generateHarmonies(baseHex) {
  return {
    complementary: [baseHex, rotateHue(baseHex, 180)],
    analogous:     [rotateHue(baseHex,-30), baseHex, rotateHue(baseHex,30)],
    triadic:       [baseHex, rotateHue(baseHex,120), rotateHue(baseHex,240)],
    tetradic:      [baseHex, rotateHue(baseHex,90), rotateHue(baseHex,180), rotateHue(baseHex,270)],
  };
}

        <div class="undertone-dot" style="background:${result.isMuted ? '#A8A8A8' : result.isVivid ? '#FF6B35' : '#D4926A'}"></div>
        ${result.isMuted ? 'Muted / soft' : result.isVivid ? 'Vivid / bright' : 'Moderate chroma'}
      </div>
    </div>
    <div class="traits-list" style="margin-top:20px;">
      ${data.traits.map(t => `
        <div class="trait-row">
          <div class="trait-icon" style="background:#fff8f8; border:1px solid var(--border);">${t.icon}</div>
          <span>${t.text}</span>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(undertoneSection);

  // ── Recommended palette
  const palSection = makeSection('Your colour palette');
  palSection.innerHTML += `
    <div class="palette-grid">
      ${data.palette.map(c => `
        <div class="palette-chip">
          <div class="palette-swatch" style="background:${c.hex}"></div>
          <div class="palette-name">${c.name}</div>
        </div>
      `).join('')}
    </div>
    <p style="font-size:0.76rem; color:var(--muted); margin-top:18px; line-height:1.7; letter-spacing:0.03em;">
      💡 ${data.tip}
    </p>
  `;
  main.appendChild(palSection);

  // ── Colours to avoid
  const avoidSection = makeSection('Colours to avoid');
  avoidSection.innerHTML += `
    <p style="font-size:0.78rem; color:var(--muted); margin-bottom:16px; line-height:1.7; letter-spacing:0.03em;">
      These tones work against your natural colouring — they can make you look washed out, sallow, or add unwanted shadows.
    </p>
    <div class="avoid-palette-grid">
      ${data.avoid.map(c => `
        <div class="avoid-chip palette-chip">
          <div class="palette-swatch" style="background:${c.hex}; opacity:0.5; position:relative;">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.6);">✕</div>
          </div>
          <div class="palette-name" style="opacity:0.65;">${c.name}</div>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(avoidSection);

  // ── Action buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.innerHTML = `
    <button class="btn btn-ghost" onclick="window.location.href='results.html'">← Pick again</button>
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">↩ Start over</button>
    <button class="btn btn-dark" id="save-btn">Save as image</button>
  `;
  main.appendChild(btnRow);

  document.getElementById('save-btn').addEventListener('click', saveResult);
}

function makeSection(title) {
  const s = document.createElement('div');
  s.className = 'analysis-section';
  s.innerHTML = `<div class="section-heading">${title}</div>`;
  return s;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── Save as image (uses canvas) ── */
function saveResult() {
  const hero = document.querySelector('.analysis-hero');
  if (!hero) return;
  alert('Tip: Use your browser\'s screenshot or print-to-PDF to save your results!');
}
</script>
</body>
</html>
