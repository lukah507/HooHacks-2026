<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Palette | Add Photo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
  <script src="/layout.js"></script>
  <link rel="icon" href="/assets/images/icon.png">
</head>
<body>
<div id="main-area">
<div id="app">
  <main>
    <p class="page-title-dark">Find Your Season</p>

    <p class="instructions">
      Remove all makeup and face a source of natural light.
      Ensure there are no colorful reflections on your skin before submitting.
    </p>

    <div class="upload-zone">
      <label for="file-input">
        <div class="upload-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="label-text">
          Upload a photo
          <span>JPG, PNG, WEBP — click to browse</span>
        </div>
      </label>
      <input type="file" id="file-input" accept="image/*" />
    </div>

    <img id="upload-preview" alt="Preview" />

    <div class="divider">or</div>

    <button class="btn btn-dark" id="open-camera-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Take a photo
    </button>

    <div style="transform: translate(0,-10px);">
      <button class="btn btn-rose" id="submit-btn">
        Submit →
      </button>
    </div>
  </main>
</div>
</div>

<!-- Camera Modal -->
<div class="backdrop" id="camera-backdrop">
  <div class="modal">
    <p class="modal-title">Take a photo</p>
    <p class="camera-error" id="camera-error" style="display:none;"></p>
    <video id="camera-video" autoplay playsinline muted></video>
    <div class="btn-row">
      <button class="btn btn-ghost" id="cancel-camera-btn">Cancel</button>
      <button class="btn btn-dark" id="capture-btn" disabled>Starting camera…</button>
    </div>
    <canvas id="capture-canvas" style="display:none;"></canvas>
  </div>
</div>

<script>
  let savedPhoto = null;

  const fileInput   = document.getElementById('file-input');
  const previewImg  = document.getElementById('upload-preview');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      savedPhoto = ev.target.result;
      previewImg.src = savedPhoto;
      previewImg.classList.add('visible');
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submit-btn').addEventListener('click', () => {
    if (!savedPhoto) {
      alert('Please upload or take a photo first!');
      return;
    }
    // Pass the photo to the next page via sessionStorage
    sessionStorage.setItem('hoohacks_photo', savedPhoto);
    window.location.href = 'results.html';
  });

  /* ── Camera ── */
  const backdrop   = document.getElementById('camera-backdrop');
  const video      = document.getElementById('camera-video');
  const captureBtn = document.getElementById('capture-btn');
  const camError   = document.getElementById('camera-error');
  const capCanvas  = document.getElementById('capture-canvas');
  let mediaStream  = null;

  document.getElementById('open-camera-btn').addEventListener('click', () => {
    camError.style.display = 'none';
    captureBtn.disabled = true;
    captureBtn.textContent = 'Starting camera…';
    backdrop.classList.add('open');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        mediaStream = stream;
        video.srcObject = stream;
        captureBtn.disabled = false;
        captureBtn.textContent = 'Capture photo';
      })
      .catch(() => {
        camError.textContent = 'Could not access your camera. Please allow camera permission and try again.';
        camError.style.display = 'block';
      });
  });

  function closeCamera() {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    backdrop.classList.remove('open');
  }

  document.getElementById('cancel-camera-btn').addEventListener('click', closeCamera);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeCamera(); });

  captureBtn.addEventListener('click', () => {
    capCanvas.width  = video.videoWidth;
    capCanvas.height = video.videoHeight;
    capCanvas.getContext('2d').drawImage(video, 0, 0);
    savedPhoto = capCanvas.toDataURL('image/png');
    previewImg.src = savedPhoto;
    previewImg.classList.add('visible');
    closeCamera();
  });
</script>
</body>
</html>
